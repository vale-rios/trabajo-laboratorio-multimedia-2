<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.5.0/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: targets/targets.mind;
              maxTrack: 1; 
              uiScanning: #scanning; 
              filterMinCF: 0.001; 
              filterBeta: 0.001;
              missTolerance: 1"
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false">
      <a-assets>
        <img id="card" src="images.jpg" />
        <a-asset-item id="avatarModel" src="assets/Auto.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
        <a-plane src="#card" position="0 0 0" height="0.552" width="1" rotation="0 0 0"></a-plane>
        <a-gltf-model 
    src="#avatarModel" 
    position="0 0 0" 
    scale="0.3 0.3 0.3" 
    animation-mixer="clip: *; loop: repeat; timeScale: 1;">
</a-gltf-model>
      </a-entity>
    </a-scene>
  </body>
</html>
